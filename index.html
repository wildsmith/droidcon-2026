<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>The End of build.gradle: Embracing Declarative Gradle and Software Types</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/theme/black.min.css" id="theme">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/darcula.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --r-main-font: 'Inter', sans-serif;
            --r-heading-font: 'Montserrat', sans-serif;
            --r-code-font: 'JetBrains Mono', monospace;
            --r-main-color: #e8edf5;
            --r-heading-color: #ffffff;
            --r-link-color: #3DDC84;
            --r-link-color-hover: #6ee7a8;
            --r-heading1-size: 2.2em;
            --r-heading2-size: 1.5em;
            --r-heading3-size: 1.2em;
            --r-main-font-size: 31px;
            --android-green: #3DDC84;
            --gradle-teal: #1BA8A0;
            --kotlin-purple: #7F52FF;
            --darcula-bg: #2b2b2b;
            --droidcon-blue: #0052D4;
            --droidcon-cyan: #00c9db;
            --droidcon-orange: #f5a623;
            --slide-bg: #041B3F;
        }

        body, .reveal-viewport {
            background: linear-gradient(160deg, #041B3F 0%, #062854 30%, #0a3d6b 60%, #0e4f7a 100%) !important;
        }

        /* Animated background - wave/beach overlay */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .reveal {
            z-index: 1;
        }

        .reveal .slides section {
            text-align: left;
            overflow: visible;
            box-sizing: border-box;
        }

        /* Code blocks: hide scrollbar for overflow slides */
        .reveal pre code::-webkit-scrollbar {
            display: none;
        }
        .reveal pre code {
            scrollbar-width: none;
        }
        .reveal .slides section:first-child {
            display: flex !important;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            padding-top: 60px;
        }

        .reveal h1, .reveal h2, .reveal h3 {
            font-weight: 700;
            text-transform: none;
            letter-spacing: -0.02em;
        }

        .reveal h1 {
            color: #ffffff;
            text-shadow: 0 2px 24px rgba(0, 201, 219, 0.35);
            font-size: 1.5em;
            margin-bottom: 0.4em;
        }

        .reveal h2 {
            color: var(--droidcon-cyan);
            font-size: 1.3em;
        }

        .reveal h3 {
            font-size: 1.1em;
        }

        .reveal strong {
            color: var(--android-green);
        }

        .reveal em {
            color: #a0c4e8;
        }

        /* Code blocks: IntelliJ Darcula with proper token coloring */
        .reveal pre {
            width: 100%;
            margin: 18px 0;
            box-shadow: none;
            border-radius: 6px;
            border: 1px solid rgba(80, 120, 160, 0.15);
        }

        .reveal pre code,
        .reveal pre code.hljs {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72em;
            line-height: 1.45;
            padding: 20px 24px;
            border-radius: 6px;
            max-height: 600px;
            background: #2b2b2b;
            color: #a9b7c6;
        }

        /* IntelliJ Darcula adjustments - CDN darcula.min.css handles most colors.
           We only tweak a few to better match IntelliJ's Gradle/Kotlin rendering. */
        .reveal pre code .hljs-keyword {
            color: #cc7832;
            font-weight: 500;
        }
        .reveal pre code .hljs-literal {
            color: #cc7832;
            font-weight: 500;
        }
        .reveal pre code .hljs-string {
            color: #6a8759;
        }
        .reveal pre code .hljs-number {
            color: #6897bb;
        }
        .reveal pre code .hljs-comment {
            color: #808080;
            font-style: italic;
        }
        .reveal pre code .hljs-built_in {
            color: #ffc66d;
        }
        .reveal pre code .hljs-title.function_ {
            color: #ffc66d;
        }
        .reveal pre code .hljs-meta {
            color: #bbb529;
        }

        /* Tables */
        .reveal table {
            font-size: 0.65em;
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            background: rgba(0,20,50,0.35);
            border-radius: 8px;
            overflow: hidden;
        }

        .reveal table th {
            background-color: rgba(0, 201, 219, 0.12);
            color: var(--droidcon-cyan);
            padding: 10px 14px;
            border-bottom: 2px solid rgba(0, 201, 219, 0.4);
            font-weight: 600;
        }

        .reveal table td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            padding: 9px 14px;
        }

        /* Lists - flush left, no bullets */
        .reveal ul, .reveal ol {
            display: block;
            padding-left: 0;
            margin-left: 0;
            font-size: 0.95em;
            list-style: none;
        }

        .reveal li {
            margin-bottom: 0.9em;
            line-height: 1.45;
        }
        .reveal ol li {
            margin-bottom: 0.6em;
        }
        .reveal li li {
            margin-bottom: 0.3em;
        }

        /* Blockquotes (used for speaker notes rendering hints) */
        .reveal blockquote {
            background: rgba(0, 201, 219, 0.06);
            border-left: 4px solid var(--droidcon-cyan);
            padding: 12px 20px;
            font-size: 0.75em;
            margin: 16px 0;
            border-radius: 0 8px 8px 0;
        }

        /* Mermaid diagrams */
        .reveal .mermaid {
            text-align: center;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .reveal .mermaid svg {
            max-height: 480px;
            width: auto;
        }

        /* Profile image styling */
        .reveal .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 3px solid var(--droidcon-cyan);
            box-shadow: 0 0 30px rgba(0, 201, 219, 0.3);
            float: right;
            margin-left: 24px;
            object-fit: cover;
        }

        /* Logo styling */
        .reveal .logo-inline {
            height: 32px;
            vertical-align: middle;
            margin: 0 6px;
        }

        .reveal .logo-large {
            height: 48px;
            vertical-align: middle;
            margin: 0 10px;
        }

        .reveal .logo-white-bg {
            background: white;
            padding: 8px 16px;
            border-radius: 6px;
            height: 40px;
        }

        /* Footer */
        #footer-left {
            position: fixed;
            bottom: 18px;
            left: 24px;
            font-size: 12px;
            color: rgba(245, 166, 35, 0.7);
            font-family: 'Inter', sans-serif;
            z-index: 30;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Accent pill for status indicators */
        .reveal .status-yes {
            color: var(--android-green);
        }
        .reveal .status-no {
            color: #ef4444;
        }
        .reveal .status-partial {
            color: var(--droidcon-orange);
        }

        /* Slide-specific: title slide */
        .reveal section:first-child h1 {
            font-size: 2.4em;
            text-align: center;
        }

        /* Arrow text styling */
        .reveal .arrow-text {
            color: var(--droidcon-cyan);
            font-size: 0.8em;
        }

        /* Inline code */
        .reveal code:not([class]) {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(43, 43, 43, 0.7);
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 0.85em;
            color: #e8bf6a;
        }

        /* Paragraph spacing */
        .reveal p {
            margin-bottom: 0.6em;
            line-height: 1.5;
        }


        /* Download buttons - top right */
        #download-buttons {
            position: fixed;
            top: 18px;
            right: 24px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        #download-buttons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-radius: 8px;
            background: transparent;
            transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
            text-decoration: none;
        }
        #download-buttons a:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.7);
            transform: scale(1.08);
        }
        #download-buttons a svg {
            width: 20px;
            height: 20px;
            fill: rgba(255, 255, 255, 0.6);
        }
        #download-buttons a:hover svg {
            fill: #ffffff;
        }

        /* Progress bar and controls - beachy orange accent */
        .reveal .progress {
            color: var(--droidcon-orange);
            height: 4px;
        }
        .reveal .controls {
            color: var(--droidcon-orange);
        }

        /* Palm tree silhouettes - rooted in the sandy beach */
        .palm-tree {
            position: fixed;
            bottom: -10px;
            width: 180px;
            height: 420px;
            z-index: 0;
            opacity: 0.09;
            pointer-events: none;
            animation: palmSway 8s ease-in-out infinite;
            transform-origin: bottom center;
        }
        .palm-tree-1 {
            right: 3%;
        }
        .palm-tree-2 {
            left: 18%;
            width: 140px;
            height: 340px;
            opacity: 0.06;
            animation-delay: -3s;
            animation-duration: 10s;
        }
        .palm-tree-3 {
            left: 2%;
            width: 160px;
            height: 380px;
            opacity: 0.07;
            animation: palmSwayLeft 9s ease-in-out infinite;
            animation-delay: -5s;
        }
        @keyframes palmSwayLeft {
            0%, 100% { transform: scaleX(-1) rotate(-1.5deg); }
            50% { transform: scaleX(-1) rotate(2deg); }
        }
        @keyframes palmSway {
            0%, 100% { transform: rotate(-1.5deg); }
            50% { transform: rotate(2deg); }
        }

        /* Floating droids on pool rings */
        .pool-droid {
            position: fixed;
            width: 36px;
            height: 36px;
            z-index: 0;
            opacity: 0.09;
            pointer-events: none;
        }
        .pool-droid-1 {
            bottom: 55%;
            animation: droidFloat1 55s linear infinite, droidBob 3.5s ease-in-out infinite;
        }
        .pool-droid-2 {
            bottom: 25%;
            animation: droidFloat2 70s linear infinite, droidBob 2.8s ease-in-out infinite;
            animation-delay: -20s;
            opacity: 0.06;
            width: 28px;
            height: 28px;
        }
        .pool-droid-3 {
            bottom: 78%;
            animation: droidFloat3 50s linear infinite, droidBob 4s ease-in-out infinite;
            animation-delay: -35s;
            opacity: 0.05;
            width: 24px;
            height: 24px;
        }
        @keyframes droidFloat1 {
            0% { left: -60px; }
            100% { left: calc(100% + 60px); }
        }
        @keyframes droidFloat2 {
            0% { right: -60px; left: auto; }
            100% { right: calc(100% + 60px); left: auto; }
        }
        @keyframes droidFloat3 {
            0% { left: -40px; }
            100% { left: calc(100% + 40px); }
        }
        @keyframes droidBob {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-5px) rotate(3deg); }
        }

        /* DroidCon icon hovering in/out from upper left */
        .droidcon-hover-icon {
            position: fixed;
            top: 30px;
            left: 30px;
            width: 60px;
            height: 60px;
            z-index: 2;
            opacity: 0.7;
            pointer-events: none;
            animation: droidconHover 4s ease-in-out infinite;
        }
        @keyframes droidconHover {
            0% { transform: rotate(0deg) translateY(0px); }
            25% { transform: rotate(3deg) translateY(-3px); }
            50% { transform: rotate(-2deg) translateY(1px); }
            75% { transform: rotate(2deg) translateY(-2px); }
            100% { transform: rotate(0deg) translateY(0px); }
        }

        /* Beach crab scuttling across the bottom */
        .beach-crab {
            position: fixed;
            bottom: 18px;
            left: -50px;
            width: 40px;
            height: 30px;
            z-index: 3;
            pointer-events: none;
            animation: crabScuttle 25s linear infinite;
        }
        @keyframes crabScuttle {
            0% { left: -50px; transform: scaleX(1); }
            45% { left: calc(100% + 50px); transform: scaleX(1); }
            50% { left: calc(100% + 50px); transform: scaleX(-1); }
            95% { left: -50px; transform: scaleX(-1); }
            100% { left: -50px; transform: scaleX(1); }
        }
        /* Beach crab scuttling across the bottom */
        .beach-crab {
            position: fixed;
            bottom: 38px;
            left: -40px;
            width: 28px;
            height: 20px;
            z-index: 3;
            opacity: 0.45;
            pointer-events: none;
            animation: crabScuttle 90s linear infinite, crabBob 0.6s ease-in-out infinite;
        }
        @keyframes crabScuttle {
            0% { left: -40px; transform: scaleX(1); }
            45% { left: calc(100% + 40px); transform: scaleX(1); }
            50% { left: calc(100% + 40px); transform: scaleX(-1); }
            95% { left: -40px; transform: scaleX(-1); }
            100% { left: -40px; transform: scaleX(1); }
        }
        @keyframes crabBob {
            0%, 100% { bottom: 38px; }
            50% { bottom: 40px; }
        }
        .crab-legs-a {
            animation: legWalkA 0.3s ease-in-out infinite;
            transform-origin: center;
        }
        .crab-legs-b {
            animation: legWalkB 0.3s ease-in-out infinite;
            transform-origin: center;
        }
        .crab-claw-left {
            animation: clawPinch 2.5s ease-in-out infinite;
            transform-origin: 14px 16px;
        }
        .crab-claw-right {
            animation: clawPinch 2.5s ease-in-out infinite 0.4s;
            transform-origin: 36px 16px;
        }
        @keyframes legWalkA {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(4deg); }
        }
        @keyframes legWalkB {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-4deg); }
        }
        @keyframes clawPinch {
            0%, 80%, 100% { transform: rotate(0deg); }
            85% { transform: rotate(-5deg); }
            90% { transform: rotate(3deg); }
            95% { transform: rotate(-3deg); }
        }

        /* Scrolling horror reveal - auto-scrolling code block */
        .horror-scroll-container {
            position: relative;
            height: 380px;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid rgba(80, 120, 160, 0.15);
            background: #2b2b2b;
        }
        .horror-scroll-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(transparent, #2b2b2b);
            pointer-events: none;
            z-index: 2;
        }
        .horror-scroll-container pre {
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }
        .horror-scroll-container pre code {
            animation: horrorScroll 20s linear infinite;
            display: block;
            padding: 20px 24px !important;
            max-height: none !important;
        }
        .horror-scroll-container:hover pre code {
            animation-play-state: paused;
        }
        @keyframes horrorScroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* Pipeline bar visualization */
        .pipeline-bar {
            display: flex;
            width: 100%;
            height: 60px;
            border-radius: 8px;
            margin: 20px 0;
            gap: 3px;
        }
        .pipeline-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6em;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: rgba(255,255,255,0.9);
            position: relative;
            transition: flex 0.3s ease;
            border-radius: 6px;
            padding: 0 8px;
            text-align: center;
            line-height: 1.3;
        }
        .pipeline-segment-label {
            font-size: 0.55em;
            opacity: 0.7;
            position: absolute;
            bottom: -22px;
            white-space: nowrap;
        }
        .pipeline-segment.unchanged {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .pipeline-segment.fast {
            background: linear-gradient(135deg, #3DDC84, #1BA8A0);
            color: #fff;
            animation: pipelinePulse 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(61,220,132,0.3);
        }
        @keyframes pipelinePulse {
            0%, 100% { box-shadow: 0 0 10px rgba(61,220,132,0.2); }
            50% { box-shadow: 0 0 25px rgba(61,220,132,0.5); }
        }

        /* IDE comparison visualization */
        .ide-model-box {
            border-radius: 8px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55em;
            line-height: 1.8;
        }
        .ide-model-kts {
            background: rgba(139, 0, 0, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .ide-model-dcl {
            background: rgba(61, 220, 132, 0.08);
            border: 1px solid rgba(61, 220, 132, 0.3);
        }

    </style>
</head>

    <script>
        // Background wave animation (beachy/tropical DroidCon Orlando aesthetic)
        (function() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let time = 0;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function drawWave(yOffset, amplitude, wavelength, speed, color, opacity) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                for (let x = 0; x <= canvas.width; x += 3) {
                    const y = yOffset + Math.sin((x / wavelength) + (time * speed)) * amplitude
                            + Math.sin((x / (wavelength * 0.6)) + (time * speed * 1.3)) * (amplitude * 0.4);
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fillStyle = color.replace('OPACITY', opacity);
                ctx.fill();
            }

            // Floating particles (bubbles/dots)
            const particles = [];
            for (let i = 0; i < 25; i++) {
                particles.push({
                    x: Math.random() * 2000,
                    y: Math.random() * 1000,
                    r: Math.random() * 2.5 + 0.5,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: -(Math.random() * 0.3 + 0.1),
                    color: ['0,201,219', '61,220,132', '245,166,35'][Math.floor(Math.random() * 3)],
                    opacity: Math.random() * 0.2 + 0.05
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                time += 0.008;

                // Draw sandy beach at very bottom
                const sandY = canvas.height * 0.94;
                const sandGrad = ctx.createLinearGradient(0, sandY, 0, canvas.height);
                sandGrad.addColorStop(0, 'rgba(210, 180, 120, 0.08)');
                sandGrad.addColorStop(0.3, 'rgba(194, 160, 90, 0.1)');
                sandGrad.addColorStop(1, 'rgba(160, 130, 70, 0.12)');
                ctx.fillStyle = sandGrad;
                ctx.fillRect(0, sandY, canvas.width, canvas.height - sandY);

                // Sand texture dots
                for (let i = 0; i < 40; i++) {
                    const sx = (i * 53 + time * 2) % canvas.width;
                    const sy = sandY + 5 + (i * 7) % (canvas.height - sandY - 8);
                    ctx.beginPath();
                    ctx.arc(sx, sy, 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(180, 150, 80, 0.06)';
                    ctx.fill();
                }

                // Draw layered waves at bottom (above sand)
                const baseY = canvas.height * 0.82;
                drawWave(baseY, 18, 400, 0.7, 'rgba(0,201,219,OPACITY)', 0.04);
                drawWave(baseY + 20, 14, 300, 1.0, 'rgba(0,82,212,OPACITY)', 0.05);
                drawWave(baseY + 35, 10, 250, 1.4, 'rgba(61,220,132,OPACITY)', 0.03);
                drawWave(baseY + 50, 8, 200, 1.8, 'rgba(245,166,35,OPACITY)', 0.025);

                // Draw particles
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color}, ${p.opacity})`;
                    ctx.fill();
                });

                // Draw subtle connecting lines between close particles
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(0, 201, 219, ${0.03 * (1 - dist/150)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(animate);
            }
            animate();
        })();

        // Mermaid init (tropical theme - DroidCon Orlando)
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                primaryColor: '#0d4a5e',
                primaryTextColor: '#ffffff',
                primaryBorderColor: '#3DDC84',
                lineColor: '#00c9db',
                secondaryColor: '#0a3d4f',
                tertiaryColor: '#1a5c3a',
                fontFamily: 'Inter, sans-serif',
                fontSize: '13px',
                nodeBorder: '#3DDC84',
                clusterBkg: 'rgba(0,201,219,0.08)',
                clusterBorder: '#f5a623',
                edgeLabelBackground: 'transparent',
                nodeTextColor: '#ffffff'
            },
            flowchart: {
                padding: 12,
                nodeSpacing: 20,
                rankSpacing: 30,
                useMaxWidth: true
            }
        });

        // Reveal.js init
        Reveal.initialize({
            controls: true,
            progress: true,
            center: true,
            hash: true,
            transition: 'fade',
            transitionSpeed: 'fast',
            margin: 0.06,
            width: 1100,
            height: 700,
            plugins: [ RevealMarkdown, RevealNotes ]
        }).then(() => {
            // Small delay to ensure markdown is fully rendered in DOM
            setTimeout(() => {
                // Highlight all code blocks with our global hljs (has Kotlin/Gradle/YAML/Bash)
                document.querySelectorAll('pre code').forEach((block) => {
                    // Strip any prior highlight attempts
                    block.classList.remove('hljs');
                    block.removeAttribute('data-highlighted');
                    // If no language specified, assume kotlin
                    if (!block.className || !block.className.match(/language-/)) {
                        block.classList.add('language-kotlin');
                    }
                    hljs.highlightElement(block);

                    // Post-process: highlight ⬇ annotation comments in green
                    block.innerHTML = block.innerHTML.replace(
                        /(\/\/\s*⬇[^\n]*)/g,
                        '<span style="color:#3DDC84; font-weight:600;">$1</span>'
                    );

                    // Post-process: color Gradle DSL block names as keywords (orange)
                    block.innerHTML = block.innerHTML.replace(
                        /(?<![.\w#"'])(\b(?:plugins|android|dependencies|buildTypes|release|debug|defaultConfig|compileOptions|kotlinOptions|buildFeatures|pluginManagement|repositories|defaults|androidLibrary|androidApplication|javaLibrary|minify|bundle|language|testOptions|unitTests|packaging|lint|kotlinSerialization|testing)\b)(?=\s*[{(])/g,
                        '<span class="hljs-keyword">$1</span>'
                    );

                    // Post-process: color properties/assignments purple (#9876aa)
                    // These are identifiers followed by = (property assignments in Gradle/DCL)
                    block.innerHTML = block.innerHTML.replace(
                        /(?<![.\w"'])(\b(?:namespace|compileSdk|minSdk|targetSdk|versionCode|versionName|applicationId|jdkVersion|sourceCompatibility|targetCompatibility|javaTarget|enabled|applicationIdSuffix|testInstrumentationRunner|isIncludeAndroidResources|isReturnDefaultValues|enableSplit|aaptOptions|multiDexKeepProguard|projectName|applicationModule|compilationScope|version|jsonEnabled|jvmTarget)\b)(?=\s*=)/g,
                        '<span style="color:#9876aa">$1</span>'
                    );
                });

                // Make all links open in a new tab
                document.querySelectorAll('.reveal a[href^="http"]').forEach((link) => {
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener noreferrer');
                });

                // Render mermaid diagrams after markdown is parsed
                document.querySelectorAll('.mermaid').forEach(async (el) => {
                    const graphDef = el.textContent;
                    const { svg } = await mermaid.render('mermaid-' + Math.random().toString(36).substr(2, 9), graphDef);
                    el.innerHTML = svg;
                });
            }, 100);
        });
    </script>
